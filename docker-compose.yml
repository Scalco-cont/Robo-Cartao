version: '3.8'

services:
  app:
    build: .
    container_name: robo_cartao
    restart: unless-stopped
    environment:
      - FLASK_DEBUG=False
    # Os volumes garantem que arquivos na fila de processamento 
    # não se percam caso o container reinicie de surpresa
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs

volumes:
  uploads_data:
  outputs_data:
